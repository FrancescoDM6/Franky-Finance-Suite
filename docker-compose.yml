# Phinan Finance Suite - Docker Compose for Cloud Deployment
# Supports: Google Cloud (GCE), Oracle Cloud, or any VPS with Docker
# Usage: docker compose up -d --build

services:
  app:
    build:
      context: .
      args:
        # Set to your domain (e.g., https://phinan.example.com)
        API_URL: ${API_URL:-http://localhost}
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - API_URL=${API_URL:-http://localhost}
      # DOMAIN enables Caddy auto-HTTPS (e.g., phinan.example.com)
      - DOMAIN=${DOMAIN:-}
      # Keep DuckDB on the persisted Docker volume even if env_file sets a local path
      - PHINAN_DATABASE__PATH=/data/phinan.duckdb
      - REDIS_URL=redis://redis:6379
    volumes:
      # Persist DuckDB data
      - phinan_data:/data
      # Caddy data & config (for auto-HTTPS certificates)
      - caddy_data:/data/caddy
      - caddy_config:/config/caddy
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1500M # Hard ceiling - OOM kill if exceeded
        reservations:
          memory: 512M # Guaranteed minimum

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # Expose only within Docker network (not to host)
    expose:
      - "6379"

volumes:
  phinan_data:
  redis_data:
  caddy_data:
  caddy_config:
