[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts = 
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto

# Custom markers for test categorization
markers =
    unit: Fast unit tests with no external dependencies
    integration: Integration tests that may use database or mocked APIs
    e2e: End-to-end workflow tests
    slow: Slow tests (skip with -m "not slow")
    performance: Performance benchmark tests

# Async configuration
asyncio_mode = auto

# Timeout for individual tests (prevents hanging)
timeout = 30

# Coverage settings (when using --cov)
# Run with: pytest --cov=phinan --cov-report=html
